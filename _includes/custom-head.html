<style>
/* ============================================================
   Burning Cost - custom styles
   Design language: dark hero, clean cards, red accent (#c0392b)
   Inspired by Stripe/Linear/Vercel - confident, not corporate
   ============================================================ */

/* === Base === */

body {
  font-size: 1rem;
  line-height: 1.7;
}

/* ============================================================
   HERO
   Full-bleed dark gradient, large knockout type
   ============================================================ */

.bc-hero {
  background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #16213e 100%);
  margin-left: calc(-50vw + 50%);
  margin-right: calc(-50vw + 50%);
  margin-top: -1px;
  padding: 0 calc(50vw - 50%);
  margin-bottom: 0;
  position: relative;
  overflow: hidden;
}

/* Subtle grid texture overlay */
.bc-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(192,57,43,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(192,57,43,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Red glow accent top-right */
.bc-hero::after {
  content: '';
  position: absolute;
  top: -120px;
  right: -80px;
  width: 480px;
  height: 480px;
  background: radial-gradient(circle, rgba(192,57,43,0.2) 0%, transparent 65%);
  pointer-events: none;
}

.bc-hero-inner {
  position: relative;
  z-index: 1;
  padding: 5rem 0 4.5rem;
  max-width: 720px;
}

.bc-hero-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #c0392b;
  margin-bottom: 1.25rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.bc-hero-label::before {
  content: '';
  display: inline-block;
  width: 18px;
  height: 2px;
  background: #c0392b;
  flex-shrink: 0;
}

.bc-hero h1 {
  font-size: 3.2rem;
  line-height: 1.08;
  margin-bottom: 1.4rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: #ffffff;
}

.bc-hero-sub {
  font-size: 1.1rem;
  color: #94a3b8;
  max-width: 600px;
  margin-bottom: 2.25rem;
  line-height: 1.7;
}

.bc-cta-row {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* ============================================================
   BUTTONS
   ============================================================ */

.bc-btn {
  display: inline-block;
  padding: 0.7rem 1.5rem;
  border-radius: 4px;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.15s ease;
  letter-spacing: 0.01em;
}

.bc-btn-primary {
  background: #c0392b;
  color: #fff;
  border: 2px solid #c0392b;
  box-shadow: 0 0 0 0 rgba(192,57,43,0);
}

.bc-btn-primary:hover {
  background: #a93226;
  border-color: #a93226;
  color: #fff;
  text-decoration: none;
  box-shadow: 0 0 24px rgba(192,57,43,0.35);
  transform: translateY(-1px);
}

/* Ghost button - used in hero on dark background */
.bc-btn-ghost {
  background: transparent;
  color: #e2e8f0;
  border: 2px solid rgba(255,255,255,0.2);
}

.bc-btn-ghost:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.4);
  color: #fff;
  text-decoration: none;
  transform: translateY(-1px);
}

/* Standard outline - used on light background */
.bc-btn-outline {
  background: transparent;
  color: #222;
  border: 2px solid #333;
}

.bc-btn-outline:hover {
  background: #333;
  color: #fff;
  text-decoration: none;
}

/* ============================================================
   STATS STRIP
   Visually separated numerical proof bar
   ============================================================ */

.bc-stats-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  border-top: 3px solid #c0392b;
  padding: 1.75rem 0;
  margin-left: calc(-50vw + 50%);
  margin-right: calc(-50vw + 50%);
  margin-bottom: 3.5rem;
  flex-wrap: wrap;
}

.bc-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 2.5rem;
  text-align: center;
}

.bc-stat-number {
  font-size: 2rem;
  font-weight: 800;
  color: #111;
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 0.2rem;
}

.bc-stat-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #999;
}

.bc-stat-divider {
  width: 1px;
  height: 2.5rem;
  background: #e0e0e0;
  flex-shrink: 0;
}

/* ============================================================
   PROBLEM STATEMENT
   ============================================================ */

.bc-problem {
  background: #f8f8f8;
  border-left: 3px solid #c0392b;
  padding: 1.75rem 2rem;
  margin-bottom: 3.5rem;
  font-size: 1rem;
  line-height: 1.75;
  color: #333;
  border-radius: 0 4px 4px 0;
}

.bc-problem p {
  margin-bottom: 0.85rem;
}

.bc-problem p:last-child {
  margin-bottom: 0;
}

.bc-problem-solution {
  color: #555;
  font-size: 0.95rem;
}

/* ============================================================
   SECTION HEADINGS
   ============================================================ */

.bc-section-title {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #c0392b;
  margin-bottom: 1.5rem;
  margin-top: 0;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.bc-section-title::after {
  content: '';
  display: block;
  flex: 1;
  height: 1px;
  background: #e8e8e8;
}

/* ============================================================
   FEATURED POSTS
   Cards with strong top accent, hover elevation
   ============================================================ */

.bc-featured {
  margin-bottom: 3.5rem;
}

.bc-featured-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 1rem;
}

.bc-featured-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-top: 3px solid #e8e8e8;
  border-radius: 4px;
  padding: 1.5rem 1.5rem 1.25rem;
  transition: border-top-color 0.15s, box-shadow 0.2s, transform 0.2s;
  display: flex;
  flex-direction: column;
  position: relative;
}

.bc-featured-card:hover {
  border-top-color: #c0392b;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  transform: translateY(-3px);
}

.bc-featured-tag {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #c0392b;
  margin-bottom: 0.65rem;
}

.bc-featured-card h3 {
  font-size: 0.975rem;
  font-weight: 700;
  margin: 0 0 0.7rem;
  line-height: 1.38;
}

.bc-featured-card h3 a {
  color: #111;
  text-decoration: none;
}

.bc-featured-card h3 a:hover {
  color: #c0392b;
}

.bc-featured-card p {
  font-size: 0.855rem;
  color: #666;
  margin: 0 0 1rem;
  line-height: 1.6;
  flex-grow: 1;
}

.bc-card-arrow {
  font-size: 0.78rem;
  font-weight: 600;
  color: #c0392b;
  letter-spacing: 0.02em;
  opacity: 0;
  transition: opacity 0.15s;
}

.bc-featured-card:hover .bc-card-arrow {
  opacity: 1;
}

/* ============================================================
   COURSE BLOCK
   Dark panel - most prominent section on the page
   ============================================================ */

.bc-course {
  background: linear-gradient(135deg, #111 0%, #1a1a2e 100%);
  border-radius: 6px;
  margin-bottom: 3.5rem;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* Red accent stripe along the top */
.bc-course::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #c0392b, #e74c3c);
}

/* Glow bottom-right */
.bc-course::after {
  content: '';
  position: absolute;
  bottom: -60px;
  right: -60px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 65%);
  pointer-events: none;
}

.bc-course-inner {
  position: relative;
  z-index: 1;
  padding: 2.75rem 2.5rem 2.25rem;
}

.bc-course-label {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #c0392b;
  margin-bottom: 0.75rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.bc-course-label::before {
  content: '';
  display: inline-block;
  width: 14px;
  height: 2px;
  background: #c0392b;
}

.bc-course h2 {
  font-size: 1.65rem;
  font-weight: 800;
  color: #fff;
  margin: 0 0 1rem;
  border: none;
  padding: 0;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.bc-course-desc {
  font-size: 0.975rem;
  color: #94a3b8;
  margin-bottom: 1.5rem;
  max-width: 620px;
  line-height: 1.7;
}

.bc-course-modules {
  font-size: 0.8rem;
  color: #64748b;
  margin-bottom: 2rem;
  line-height: 1.9;
}

.bc-course-pricing {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1.75rem;
  align-items: stretch;
}

.bc-price-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  padding: 1rem 1.25rem;
  text-align: center;
  min-width: 110px;
  transition: border-color 0.15s, background 0.15s;
}

.bc-price-item:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
}

.bc-price-item--featured {
  background: rgba(192,57,43,0.15);
  border-color: rgba(192,57,43,0.45);
  box-shadow: 0 0 20px rgba(192,57,43,0.15);
}

.bc-price-item--featured:hover {
  background: rgba(192,57,43,0.22);
  border-color: rgba(192,57,43,0.65);
}

.bc-price-amount {
  font-size: 1.7rem;
  font-weight: 800;
  color: #fff;
  display: block;
  line-height: 1;
  margin-bottom: 0.3rem;
  letter-spacing: -0.02em;
}

.bc-price-label {
  font-size: 0.68rem;
  color: #64748b;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

.bc-price-item--featured .bc-price-label {
  color: #e07070;
}

.bc-course .bc-cta-row {
  margin-top: 0;
}

/* ============================================================
   REPOS
   ============================================================ */

.bc-repos {
  margin-bottom: 3.5rem;
}

.bc-repo-group {
  margin-bottom: 2.25rem;
}

.bc-repo-group-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #bbb;
  margin-bottom: 0.85rem;
  padding-left: 0.5rem;
  border-left: 2px solid #e0e0e0;
}

.bc-repo-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 0.65rem;
}

.bc-repo-item {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-left: 3px solid transparent;
  border-radius: 4px;
  padding: 1rem 1.15rem;
  transition: border-left-color 0.15s, box-shadow 0.15s, transform 0.15s;
}

.bc-repo-item:hover {
  border-left-color: #c0392b;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  transform: translateY(-1px);
}

.bc-repo-item a {
  font-weight: 700;
  font-size: 0.875rem;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  text-decoration: none;
  color: #1a1a1a;
  display: block;
  margin-bottom: 0.4rem;
}

.bc-repo-item a:hover {
  color: #c0392b;
  text-decoration: none;
}

.bc-repo-item p {
  font-size: 0.82rem;
  color: #666;
  margin: 0;
  line-height: 1.58;
}

/* ============================================================
   POSTS LIST
   ============================================================ */

.bc-posts {
  margin-bottom: 3.5rem;
}

.bc-post-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.bc-post-item {
  padding: 0.9rem 0;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: baseline;
  gap: 1rem;
  flex-wrap: wrap;
  transition: padding-left 0.15s;
}

.bc-post-item:first-child {
  border-top: none;
}

.bc-post-item:last-child {
  border-bottom: none;
}

.bc-post-item:hover {
  padding-left: 0.4rem;
}

.bc-post-date {
  font-size: 0.75rem;
  color: #ccc;
  white-space: nowrap;
  min-width: 80px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.bc-post-item a {
  font-size: 0.95rem;
  font-weight: 500;
  color: #333;
  text-decoration: none;
}

.bc-post-item a:hover {
  color: #c0392b;
}

/* ============================================================
   NEWSLETTER CTA
   Dark panel with gradient border treatment
   ============================================================ */

.bc-newsletter {
  background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
  border-radius: 6px;
  margin-bottom: 3.5rem;
  border: 1px solid rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
}

/* Gradient border on top */
.bc-newsletter::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, #c0392b 0%, #e74c3c 50%, transparent 100%);
}

.bc-newsletter-inner {
  position: relative;
  z-index: 1;
  padding: 2.25rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  flex-wrap: wrap;
}

.bc-newsletter-copy h3 {
  font-size: 1.2rem;
  font-weight: 800;
  margin: 0 0 0.4rem;
  color: #fff;
  letter-spacing: -0.02em;
}

.bc-newsletter-copy p {
  font-size: 0.9rem;
  color: #94a3b8;
  margin: 0;
  max-width: 460px;
  line-height: 1.65;
}

.bc-newsletter .bc-btn-primary {
  white-space: nowrap;
  flex-shrink: 0;
  padding: 0.8rem 1.75rem;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */

@media (max-width: 700px) {
  .bc-hero h1 {
    font-size: 2.2rem;
  }

  .bc-hero-inner {
    padding: 3.5rem 0 3rem;
  }

  .bc-stats-strip {
    gap: 0;
    padding: 1.25rem 0;
  }

  .bc-stat {
    padding: 0.75rem 1.25rem;
    flex: 1 1 40%;
  }

  .bc-stat-divider {
    display: none;
  }

  .bc-stat-number {
    font-size: 1.6rem;
  }

  .bc-course-inner {
    padding: 2rem 1.5rem 1.75rem;
  }

  .bc-course h2 {
    font-size: 1.35rem;
  }

  .bc-newsletter-inner {
    padding: 1.75rem 1.5rem;
    flex-direction: column;
    align-items: flex-start;
  }

  .bc-newsletter .bc-btn-primary {
    width: 100%;
    text-align: center;
  }

  .bc-featured-grid {
    grid-template-columns: 1fr;
  }

  .bc-repo-list {
    grid-template-columns: 1fr;
  }
}
</style>
