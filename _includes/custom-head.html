<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #4f7ef8;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Make the minima header look tighter */
  .site-header {
    border-top: 3px solid #4f7ef8;
    border-bottom: 1px solid #e4e7ef;
  }

  .site-title {
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  /* Improve code block styling */
  code, pre {
    font-family: var(--mono);
    font-size: 0.85em;
  }

  .highlight {
    border-radius: 6px;
    overflow: hidden;
  }

  /* Better link styling in post content */
  .post-content a, .page-content a {
    color: var(--accent);
    text-decoration: none;
  }

  .post-content a:hover, .page-content a:hover {
    text-decoration: underline;
  }

  /* Table improvements for course pricing table */
  .post-content table, .page-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 1.5rem 0;
    font-size: 0.9rem;
  }

  .post-content th, .page-content th {
    background: #f7f8fc;
    font-weight: 600;
    text-align: left;
    padding: 0.6rem 0.85rem;
    border: 1px solid #e4e7ef;
  }

  .post-content td, .page-content td {
    padding: 0.6rem 0.85rem;
    border: 1px solid #e4e7ef;
  }

  /* Headings */
  h1, h2, h3, h4 {
    letter-spacing: -0.02em;
  }
</style>
